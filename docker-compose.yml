version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: explorex-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: explorex
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - explorex-net

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: explorex-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - explorex-net

  # ── Backend ────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: explorex-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      MONGODB_URI: mongodb://admin:password@mongo:27017/explorex?authSource=admin
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - explorex-net

  # ── Frontend ───────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: explorex-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - explorex-net

volumes:
  mongo_data:
  redis_data:

networks:
  explorex-net:
    driver: bridge
